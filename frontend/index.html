<!DOCTYPE html>
<html>
<head>
  <title>Merch Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Store Product Search</h1>

  <button id="chat-button">ChatBot</button>

  <div id="chat-window" class="hidden">
    <div id="chat-header">Merchandise Staff</div>
    <div id="messages"></div>

    <div id="input-row">
      <input id="chat-input" placeholder="Ask about product stock..." />
      <button id="send-button">Send</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
